<!DOCTYPE html>
<html>
<head>
    <title>Station Report</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            overflow-x: hidden;
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #0d1b2a;
            position: fixed;
            width: 240px;
            padding-top: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar h4 {
            color: white;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 6px 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #1b263b;
            color: white;
        }

        .sidebar a.active {
            background: #1b263b;
            color: white;
        }

        .sidebar a span {
            margin-left: 10px;
        }

        .sidebar.collapsed a span {
            display: none;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
            transition: 0.3s;
        }

        .content.collapsed {
            margin-left: 70px;
        }

        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="/emergency_logs">
        <i class="bi bi-clock-history"></i>
        <span>Emergency Logs</span>
    </a>

    <a href="/pending_requests">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Pending FIR Requests</span>
    </a>

    <a href="/station_report" class="active">
        <i class="bi bi-bar-chart"></i>
        <span>Reports</span>
    </a>

    <a href="/officer_profile">
        <i class="bi bi-people"></i>
        <span>Officers</span>
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- TOP NAV -->
    <nav class="navbar navbar-light bg-white shadow-sm rounded mb-4">
        <div class="container-fluid">

            <button class="btn btn-outline-secondary" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>

            <span class="navbar-brand">Station Report</span>

            <div class="d-flex align-items-center">
                <img src="https://i.pravatar.cc/40" class="profile-img me-2">
                <strong>Officer</strong>
            </div>

        </div>
    </nav>

    <!-- CHART -->
    <div class="card shadow mb-4">
        <div class="card-body">
            <h5>FIRs per Police Station</h5>
            <canvas id="stationChart"></canvas>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow">
        <div class="card-body">
            <h5>Station-wise Case Data</h5>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Station</th>
                        <th>Total Cases</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in station_data %}
                    <tr>
                        <td>{{ row.station_name }}</td>
                        <td>{{ row.total_cases }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- SCRIPT -->
<script>
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('collapsed');
    document.querySelector('.content').classList.toggle('collapsed');
}

// Chart Data from Flask
const stationData = {{ station_data | tojson }};

const labels = stationData.map(item => item.station_name);
const values = stationData.map(item => item.total_cases);

const ctx = document.getElementById('stationChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Total FIRs',
            data: values,
            backgroundColor: 'rgba(13, 27, 42, 0.8)'
        }]
    },
    options: {
        responsive: true
    }
});
</script>

</body>
</html>
