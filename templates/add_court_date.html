<!DOCTYPE html>
<html>
<head>
    <title>Add Court Date</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h3>Add Court Date</h3>

<form method="POST">

    <div class="mb-3">
        <label>FIR ID</label>
        <input type="number" name="fir_id" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Court Date</label>
        <input type="date" name="court_date" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Court Location</label>
        <input type="text" name="court_location" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Status</label>
        <select name="status" class="form-control">
            <option value="Scheduled">Scheduled</option>
            <option value="Completed">Completed</option>
            <option value="Postponed">Postponed</option>
        </select>
    </div>

    <button class="btn btn-primary">Add</button>

</form>

</body>
</html>
