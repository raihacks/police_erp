<!DOCTYPE html>
<html>
<head>
<title>Emergency Logs</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            overflow-x: hidden;
            background-color: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: #0d1b2a;
            position: fixed;
            width: 240px;
            padding-top: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar h4 {
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 6px 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.2s;
        }

        .sidebar a i {
            font-size: 18px;
            width: 25px;
        }

        .sidebar a span {
            margin-left: 10px;
        }

        .sidebar a:hover {
            background: #1b263b;
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar a.active {
            background: #1b263b;
            color: #fff;
            font-weight: 500;
        }

        .sidebar.collapsed a span {
            display: none;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 20px;
            transition: 0.3s;
        }

        .content.collapsed {
            margin-left: 70px;
        }

        /* CARDS */
        .card-hover:hover {
            transform: translateY(-3px);
            transition: 0.2s;
        }

        /* PROFILE */
        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="/court_management">
        <i class="bi bi-calendar-event"></i>
        <span>Court management</span>
    </a>
<a href="/emergency_logs">
<i class="bi bi-clock-history"></i>
<span>Emergency Logs</span>
</a>
    <a href="/pending_requests">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Pending FIR Requests</span>
    </a>
    <a href="/station_report" >
        <i class="bi bi-bar-chart"></i>
        <span>Reports</span>
    </a>



    <a href="/settings">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
    </a>
</div>
<div class="content">

<nav class="navbar bg-white shadow-sm rounded mb-4">
<div class="container-fluid">
<span class="navbar-brand">Emergency Call Logs</span>
</div>
</nav>

<div class="card shadow">
<div class="card-body">

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>Log ID</th>
<th>Call ID</th>
<th>Log Time</th>
</tr>
</thead>

<tbody>

{% for log in logs %}

<tr>
<td>{{ log.log_id }}</td>
<td>{{ log.call_id }}</td>
<td>{{ log.log_time }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
