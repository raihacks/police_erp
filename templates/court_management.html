<!DOCTYPE html>
<html>
<head>
    <title>Court Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            background: #0d1b2a;
            padding-top: 20px;
        }

        .sidebar a {
            display: flex;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #1b263b;
            color: white;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        .card { border-radius: 12px; }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="/add_court_date">
        <i class="bi bi-calendar-event"></i>
        <span>Court Dates</span>
    </a>
<a href="/emergency_logs">
<i class="bi bi-clock-history"></i>
<span>Emergency Logs</span>
</a>
    <a href="/pending_requests">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Pending FIR Requests</span>
    </a>
    <a href="/station_report" >
        <i class="bi bi-bar-chart"></i>
        <span>Reports</span>
    </a>

    <a href="/officer_profile">
        <i class="bi bi-people"></i>
        <span>Officers</span>
    </a>

    <a href="#">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
    </a>
</div>


<!-- CONTENT -->
<div class="content">

    <h3 class="mb-4">Court Management</h3>

    <!-- ADD FORM -->
    <div class="card shadow mb-4">
        <div class="card-body">
            <h5>Add Court Date</h5>

            <form method="POST">
                <div class="row">
                    <div class="col-md-3">
                        <input type="number" name="fir_id" class="form-control" placeholder="FIR ID" required>
                    </div>

                    <div class="col-md-3">
                        <input type="date" name="court_date" class="form-control" required>
                    </div>

                    <div class="col-md-3">
                        <input type="text" name="court_location" class="form-control" placeholder="Location" required>
                    </div>

                    <div class="col-md-2">
                        <select name="status" class="form-control">
                            <option>Scheduled</option>
                            <option>Completed</option>
                            <option>Postponed</option>
                        </select>
                    </div>

                    <div class="col-md-1">
                        <button class="btn btn-primary w-100">
                            <i class="bi bi-plus"></i>
                        </button>
                    </div>
                </div>
            </form>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow">
        <div class="card-body">

            <h5>All Court Dates</h5>

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>FIR</th>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for c in court_dates %}
                    <tr>

                        <!-- INLINE EDIT FORM -->
                        <form method="POST" action="/update_court_date/{{ c.court_id }}">

                        <td>
                            <input type="number" name="fir_id" value="{{ c.fir_id }}" class="form-control">
                        </td>

                        <td>
                            <input type="date" name="court_date" value="{{ c.court_date }}" class="form-control">
                        </td>

                        <td>
                            <input type="text" name="court_location" value="{{ c.court_location }}" class="form-control">
                        </td>

                        <td>
                            <select name="status" class="form-control">
                                <option {% if c.status=='Scheduled' %}selected{% endif %}>Scheduled</option>
                                <option {% if c.status=='Completed' %}selected{% endif %}>Completed</option>
                                <option {% if c.status=='Postponed' %}selected{% endif %}>Postponed</option>
                            </select>
                        </td>

                        <td>
                            <button class="btn btn-success btn-sm">
                                <i class="bi bi-check"></i>
                            </button>

                            <a href="/delete_court_date/{{ c.court_id }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>

                        </form>

                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
