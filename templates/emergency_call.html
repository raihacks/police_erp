<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request FIR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3>Emergency Alert</h3>
    <form method="POST">
        <div class="mb-3">
            <label>Citizen Name</label>
            <input type="text" name="citizen_name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="citizen_phone" class="form-control">
        </div>
        <div class="mb-3">
            <label>City</label>
            <input type="text" name="city" class="form-control" required>
        </div>
        <button class="btn btn-danger">Send Emergency Alert</button><div class="mt-3">
    <a href="{{ url_for('citizen_dashboard') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left-circle"></i> Back to Dashboard
    </a>
</div>
    </form>
</div>
</body>
</html>
