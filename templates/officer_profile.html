<!DOCTYPE html>
<html>
<head>
<title>Officer Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">
<div class="card-header bg-dark text-white">
<h4>Officer Profile Settings</h4>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" value="{{ officer.name }}" disabled>
</div>

<div class="mb-3">
<label class="form-label">Rank</label>
<input type="text" class="form-control" value="{{ officer.officer_rank }}" disabled>
</div>

<div class="mb-3">
<label class="form-label">Station</label>
<input type="text" class="form-control" value="{{ officer.station }}" disabled>
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" class="form-control" name="phone" value="{{ officer.phone }}">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" name="email" value="{{ officer.email }}">
</div>

<button class="btn btn-primary">Update Profile</button>
<a href="/police_dashboard" class="btn btn-secondary">Back</a>

</form>

</div>
</div>

</div>

</body>
</html>
