<!DOCTYPE html>
<html>
<head>
    <title>Pending FIR Requests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
            background-color: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: #0d1b2a;
            position: fixed;
            width: 240px;
            padding-top: 20px;
            transition: 0.3s;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .sidebar h4 {
            color: white;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            margin: 6px 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #1b263b;
            color: white;
        }

        .sidebar a i {
            width: 25px;
        }

        .sidebar.collapsed a span {
            display: none;
        }

        /* CONTENT */
        .content {
            margin-left: 240px;
            padding: 20px;
            transition: 0.3s;
        }

        .content.collapsed {
            margin-left: 70px;
        }

        .profile-img {
            width: 35px;
            border-radius: 50%;
        }

        .table-card {
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="/court_management">
        <i class="bi bi-calendar-event"></i>
        <span>Court management</span>
    </a>


<a href="/emergency_logs">
<i class="bi bi-clock-history"></i>
<span>Emergency Logs</span>
</a>
    <a href="/pending_requests">
        <i class="bi bi-exclamation-triangle"></i>
        <span>Pending FIR Requests</span>
    </a>
    <a href="/station_report" >
        <i class="bi bi-bar-chart"></i>
        <span>Reports</span>
    </a>

    <a href="/officer_profile">
        <i class="bi bi-people"></i>
        <span>Officers</span>
    </a>

    <a href="#">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
    </a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- TOP NAV -->
    <nav class="navbar bg-white shadow-sm rounded mb-4 px-3">
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-secondary me-3" onclick="toggleSidebar()">
                <i class="bi bi-list"></i>
            </button>
            <h5 class="mb-0">Pending FIR Requests</h5>
        </div>

        <div class="d-flex align-items-center">
            <img src="https://i.pravatar.cc/40" class="profile-img me-2">
            <strong>Officer</strong>
        </div>
    </nav>

    <!-- TABLE CARD -->
    <div class="card shadow table-card">
        <div class="card-body">

            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Citizen</th>
                        <th>Crime</th>
                        <th>City</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in requests %}
                    <tr>
                        <td><strong>#{{ r.request_id }}</strong></td>
                        <td>{{ r.citizen_name }}</td>
                        <td>
                            <span class="badge bg-warning text-dark">
                                {{ r.crime_type }}
                            </span>
                        </td>
                        <td>{{ r.city }}</td>
                        <td class="text-center">

                            <form method="POST" action="/approve_request/{{ r.request_id }}" class="d-inline">
                                <button name="decision" value="Approved"
                                    class="btn btn-success btn-sm">
                                    <i class="bi bi-check-circle"></i>
                                </button>
                            </form>

                            <form method="POST" action="/approve_request/{{ r.request_id }}" class="d-inline">
                                <button name="decision" value="Rejected"
                                    class="btn btn-danger btn-sm">
                                    <i class="bi bi-x-circle"></i>
                                </button>
                            </form>

                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>

<!-- SCRIPT -->
<script>
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('collapsed');
    document.querySelector('.content').classList.toggle('collapsed');
}
</script>

</body>
</html>
