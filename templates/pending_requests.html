<!DOCTYPE html>
<html>
<head>
    <title>Pending FIR Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4">Pending FIR Requests</h2>

```
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Crime</th>
            <th>City</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
        {% for r in requests %}
        <tr>
            <td>{{ r.request_id }}</td>
            <td>{{ r.citizen_name }}</td>
            <td>{{ r.crime_type }}</td>
            <td>{{ r.city }}</td>
            <td>
                <form method="POST" action="/approve_request/{{ r.request_id }}">
                    <button name="decision" value="Approved" class="btn btn-success btn-sm">Approve</button>
                    <button name="decision" value="Rejected" class="btn btn-danger btn-sm">Reject</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
```

</div>

</body>
</html>
