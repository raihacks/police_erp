<!DOCTYPE html>
<html>
<head>
<title>Add Emergency Call</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
overflow-x:hidden;
}

.sidebar{
height:100vh;
background:#0d1b2a;
position:fixed;
width:240px;
padding-top:20px;
}

.sidebar a{
display:flex;
align-items:center;
padding:12px 20px;
margin:6px 10px;
color:#cbd5e1;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#1b263b;
color:white;
}

.content{
margin-left:240px;
padding:20px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mb-3">Police ERP</h4>
    <hr style="border-color: rgba(255,255,255,0.15);">

    <a href="/police_dashboard" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
    </a>

    <a href="/add_fir">
        <i class="bi bi-file-earmark-plus"></i>
        <span>Add FIR</span>
    </a>

    <a href="/view_fir">
        <i class="bi bi-folder2-open"></i>
        <span>View FIRs</span>
    </a>

    <a href="#">
        <i class="bi bi-calendar-event"></i>
        <span>Court Dates</span>
    </a>
    <a href="/add_emergency_call">
<i class="bi bi-telephone"></i>
<span>Emergency Call</span>
</a>

<a href="/emergency_logs">
<i class="bi bi-clock-history"></i>
<span>Emergency Logs</span>
</a>

    <a href="#">
        <i class="bi bi-people"></i>
        <span>Officers</span>
    </a>

    <a href="#">
        <i class="bi bi-gear"></i>
        <span>Settings</span>
    </a>
</div>

<!-- CONTENT -->
<div class="content">

<nav class="navbar bg-white shadow-sm mb-4 rounded">
<div class="container-fluid">
<span class="navbar-brand">Add Emergency Call</span>
</div>
</nav>

<div class="card shadow">
<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Citizen ID</label>
<input type="number" name="citizen_id" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" name="location" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="4" required></textarea>
</div>

<button class="btn btn-danger">
<i class="bi bi-telephone-fill"></i> Submit Emergency Call
</button>

</form>

</div>
</div>

</div>

</body>
</html>
