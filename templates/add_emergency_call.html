<!DOCTYPE html>
<html>
<head>
<title>Add Emergency Call</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
overflow-x:hidden;
}

.sidebar{
height:100vh;
background:#0d1b2a;
position:fixed;
width:240px;
padding-top:20px;
}

.sidebar a{
display:flex;
align-items:center;
padding:12px 20px;
margin:6px 10px;
color:#cbd5e1;
text-decoration:none;
border-radius:8px;
}

.sidebar a:hover{
background:#1b263b;
color:white;
}

.content{
margin-left:240px;
padding:20px;
}
</style>

</head>

<body>



<!-- CONTENT -->
<div class="content">

<nav class="navbar bg-white shadow-sm mb-4 rounded">
<div class="container-fluid">
<span class="navbar-brand">Add Emergency Call</span>
</div>
</nav>

<div class="card shadow">
<div class="card-body">

<form method="POST">

<div class="mb-3">
<label class="form-label">Citizen ID</label>
<input type="number" name="citizen_id" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Location</label>
<input type="text" name="location" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="4" required></textarea>
</div>

<button class="btn btn-danger">
<i class="bi bi-telephone-fill"></i> Submit Emergency Call
</button>

</form>

</div>
</div>

</div>

</body>
</html>
